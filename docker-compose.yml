version: '3.8'

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: internhub_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: intern_management
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chatbot -d intern_management" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Hasura GraphQL Engine ─────────────────────────────────────────────────
  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: internhub_hasura
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./hasura/metadata:/hasura-metadata        # ← ADD THIS
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://chatbot:chatbot123@postgres:5432/intern_management"
      HASURA_GRAPHQL_METADATA_DATABASE_URL: "postgres://chatbot:chatbot123@postgres:5432/intern_management"
      HASURA_GRAPHQL_ADMIN_SECRET: "myadminsecret"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"change-me-to-a-long-random-string-min-32-chars"}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log, query-log"
      HASURA_GRAPHQL_METADATA_DIR: "/hasura-metadata"   

volumes:
  postgres_data: